<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles.css">
  
  <title>Frontend Mentor | QR code component</title>
</head>
<body>
    <div class="header"></div>
    <div class="content">

        <div class="card">

            <img src="./images/image-qr-code.png" alt="qr code">

            <div class="text">
                
                <div class="upper-text">Improve your front-end skills by building projects</div>

                <div class="lower-text">Scan the QR code to visit Frontend<br>Mentor and take your coding skills to<br>the next level</div>
            </div>    

        </div>
    </div>    
    <div class="footer">
        <div class="attribution">
        Challenge by <a href="https://www.frontendmentor.io?ref=challen ge" target="_blank">Frontend Mentor</a>. 
        Coded by <a href="https://github.com/demense">demense</a>.
        </div>
    </div>
</body>
</html>
